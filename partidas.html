<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calendário fictício de partidas de e-sports com filtros por jogo, status e destaque para jogos ao vivo.">
    <meta name="author" content="Rafael">
    <meta property="og:title" content="Partidas | GTATIC">
    <meta property="og:description" content="Acompanhe confrontos de CS2, Valorant, LoL e Overwatch em cards responsivos.">
    <meta property="og:image" content="assets/images/gtatic.png">
    <meta property="og:type" content="website">
    <title>Partidas competitivas | GTATIC</title>
    <link rel="icon" href="assets/icons/favicon.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="partidas">
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="GTATIC - página inicial">
            <img src="assets/images/gtatic.png" alt="Logotipo GTATIC" width="144" height="48">
        </a>
        <button class="nav-toggle" type="button" aria-label="Abrir menu" aria-controls="primary-menu" aria-expanded="false"><span></span><span></span><span></span></button>
        <nav class="site-nav" aria-label="Navegação principal">
            <ul id="primary-menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="ranking.html">Ranking</a></li>
                <li><a href="noticias.html">Notícias</a></li>
                <li><a href="partidas.html">Partidas</a></li>
                <li><a href="eventos.html">Eventos</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Alternar tema">Tema</button>
    </header>
    <p class="source-banner" data-source-banner hidden></p>

    <main>
        <section class="page-hero">
            <div class="container">
                <span class="eyebrow">Calendário competitivo</span>
                <h1>Partidas competitivas</h1>
                <p>Confrontos fictícios com status, horário e campeonato para simular um hub de agenda de e-sports.</p>
            </div>
        </section>

        <section class="section">
            <div class="container toolbar">
                <label class="search-field" for="match-search">
                    <span>Buscar partidas</span>
                    <input id="match-search" type="search" data-match-search placeholder="Ex.: LOUD, final, Major">
                </label>
                <div class="filter-group" data-match-filters aria-label="Filtrar partidas por jogo"></div>
                <div class="filter-group" data-status-filters aria-label="Filtrar partidas por status"></div>
            </div>
            <div class="container match-grid" data-match-list></div>
            <p class="empty-state container" data-match-empty hidden>Nenhuma partida encontrada.</p>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 GTATIC. Projeto estático para portfólio.</p>
    </footer>
    <button class="back-to-top" type="button" data-back-to-top aria-label="Voltar ao topo">↑</button>
    <script src="js/fallback-data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
